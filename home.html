<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github issue tracker</title>
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + daisyUI -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- stylesheet -->
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="navbar bg-base-100 px-10 h-[78px]">
      <div class="navbar-start">
        <div class="flex items-center">
          <img
            src="./assets/github-logo.png"
            alt="Logo"
            class="w-[36px] h-[36px]"
          />
          <h2 class="text-[#1F2937] text-[24px] font-semibold ml-3">
            GitHub Issues Tracker
          </h2>
        </div>
      </div>
      <div class="navbar-end gap-4">
        <div class="relative w-full max-w-xs">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"
          >
            <i class="fas fa-search"></i>
          </span>
          <input
            type="text"
            placeholder="Search issues..."
            class="input input-bordered w-full pl-10 focus:outline-none focus:border-[#4A00FF]"
          />
        </div>
        <button class="btn btn-primary bg-[#4A00FF] text-white">
          <i class="fas fa-plus mr-2"></i> New Issue
        </button>
      </div>
    </div>

    <section>
      <div class="max-w-7xl mx-auto space-y-4">
        <!-- TAB BUTTONS: All, Open, Closed -->
        <div class="bg-white rounded-xl p-3 flex gap-2 shadow-sm">
          <button
            id="tab-all"
            class="btn btn-sm btn-primary"
            onclick="switchTab('all')"
          >
            All
          </button>
          <button
            id="tab-open"
            class="btn btn-sm btn-outline"
            onclick="switchTab('open')"
          >
            Open
          </button>
          <button
            id="tab-closed"
            class="btn btn-sm btn-outline"
            onclick="switchTab('closed')"
          >
            Closed
          </button>
        </div>

        <!-- HEADER: issue count + open/closed legend -->
        <div
          class="bg-white rounded-xl p-4 flex items-center justify-between shadow-sm flex-wrap gap-3"
        >
          <div class="flex items-center gap-3">
            <div
              class="bg-violet-100 text-violet-600 w-11 h-11 rounded-full flex items-center justify-center"
            >
              <img src="./assets/Aperture.png" alt="" />
            </div>
            <div>
              <p class="text-lg font-bold" id="issue-count">0 Issues</p>
              <p class="text-sm text-gray-400">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-4 text-sm font-medium">
            <span class="flex items-center gap-1">
              <i class="fa-solid fa-circle text-green-500 text-xs"></i> Open
            </span>
            <span class="flex items-center gap-1">
              <i class="fa-solid fa-circle text-purple-500 text-xs"></i> Closed
            </span>
          </div>
        </div>

        <!-- LOADING SPINNER: shown while data is being fetched -->
        <div id="spinner" class="flex justify-center py-20">
          <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <!-- CARDS GRID: issue cards appear here -->
        <!-- hidden at first, JS shows it after data loads -->
        <div
          id="cards-grid"
          class="hidden grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"
        ></div>
      </div>
      

      <!-- MODAL: pops up when user clicks a card -->
      <dialog id="issue-modal" class="modal">
        <div class="modal-box max-w-lg">
          <!-- Title -->
          <h3 class="text-lg font-bold mb-2" id="modal-title"></h3>

          <!-- Status + author + date -->
          <div
            class="flex flex-wrap items-center gap-2 text-sm text-gray-400 mb-4"
          >
            <span
              id="modal-status"
              class="badge text-white font-semibold"
            ></span>
            <span>•</span>
            <span id="modal-author"></span>
            <span>•</span>
            <span id="modal-date"></span>
          </div>

          <!-- Label badges -->
          <div id="modal-labels" class="flex flex-wrap gap-2 mb-4"></div>

          <!-- Description -->
          <p
            id="modal-desc"
            class="text-sm text-gray-600 leading-relaxed mb-5"
          ></p>

          <!-- Assignee + Priority box -->
          <div class="bg-gray-50 rounded-xl p-4 flex gap-10 flex-wrap mb-5">
            <div>
              <p class="text-xs text-gray-400 mb-1">Assignee:</p>
              <p id="modal-assignee" class="font-bold text-sm"></p>
            </div>
            <div>
              <p class="text-xs text-gray-400 mb-1">Priority:</p>
              <div id="modal-priority"></div>
            </div>
          </div>

          <!-- Close button -->
          <div class="flex justify-end">
            <button class="btn btn-primary" onclick="closeModal()">
              Close
            </button>
          </div>
        </div>

        <!-- click outside modal to close -->
        <form method="dialog" class="modal-backdrop">
          <button>close</button>
        </form>
      </dialog>
    </section>
    <script src="./script/index.js"></script>
  </body>
</html>
