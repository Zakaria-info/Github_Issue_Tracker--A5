<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github issue tracker</title>
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind + daisyUI -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
     <!-- stylesheet -->
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="navbar bg-base-100 px-10 h-[78px]">
      <div class="navbar-start">
        <div class="flex items-center">
          <img
            src="./assets/github-logo.png"
            alt="Logo"
            class="w-[36px] h-[36px]"
          />
          <h2 class="text-[#1F2937] text-[24px] font-semibold ml-3">
            GitHub Issues Tracker
          </h2>
        </div>
      </div>
      <div class="navbar-end gap-4">
        <div class="relative w-full max-w-xs">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
          <i class="fas fa-search"></i> </span>
        <input 
          type="text" 
          placeholder="Search issues..." 
          class="input input-bordered w-full pl-10 focus:outline-none focus:border-[#4A00FF]" 
        />
      </div>
        <button class="btn btn-primary bg-[#4A00FF] text-white">
          <i class="fas fa-plus mr-2"></i> New Issue
        </button>
      </div>
    </div>
  </body>
</html>
